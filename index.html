<!DOCTYPE html>
<html>
<head>
    <title>AgriSmart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>AgriSmart - Storage Risk Checker</h1>
<p>Reducing post-harvest losses through smart storage monitoring.</p>
<label>Select Crop:</label>
<select id="crop">
    <option>Tomato</option>
    <option>Onion</option>
    <option>Potato</option>
</select>

<br><br>

<label>Temperature (°C):</label>
<input type="number" id="temp">

<br><br>
   
<label>Humidity (%):</label>
<input type="number" id="humidity">

<br><br>

<label>Storage Days:</label>
<input type="number" id="days">

<br><br>

<label>Quantity (in quintals):</label><br>
<input type="number" id="quantity">

<br><br>

<label>Available Storage Space (in cubic feet):</label><br>
<input type="number" id="space">

<br><br>

<button onclick="checkStorage()">Check Risk</button>

<h2 id="result"></h2>
<p id="riskPercent"></p>
<h2>Best Market to Sell</h2>
<p id="marketResult"></p>
<h2>Market Price Comparison</h2>
<canvas id="marketChart"></canvas>
<h2>Storage Space Analysis</h2>
<p id="spaceResult"></p>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
